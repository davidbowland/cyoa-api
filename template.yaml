AWSTemplateFormatVersion: 2010-09-09
Description: >-
  API for cyoa project

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: Environment for deploy

Mappings:
  EnvironmentMap:
    prod:
      bucketName: cyoa-api-assets
      certificate: adce1a21-90b4-4120-8548-111215e582f0
      corsDomain: https://cyoa.dbowland.com
      domain: cyoa-api.dbowland.com
      domainAssets: cyoa-assets.dbowland.com
      gamesTable: cyoa-api-games
      logStreamFunction: log-subscriber
      narrativesTable: cyoa-api-narratives
      originAccessIdentity: E25604SQJB5XYQ
      project: cyoa
      promptsTable: cyoa-api-prompts
      scheduledGameCreationEnabled: true
      zoneId: Z072422417XWM8PIXXSFA
    test:
      bucketName: cyoa-api-assets-test
      certificate: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      corsDomain: https://cyoa.bowland.link
      domain: cyoa-api.bowland.link
      domainAssets: cyoa-assets.bowland.link
      gamesTable: cyoa-api-games-test
      logStreamFunction: log-subscriber-test
      narrativesTable: cyoa-api-narratives-test
      originAccessIdentity: E2UUWYVZTOVX9H
      project: cyoa-test
      promptsTable: cyoa-api-prompts-test
      scheduledGameCreationEnabled: false
      zoneId: Z01312547RGU1BYKIJXY

Resources:
  # API Gateway

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Api-Key
          - X-Twitch-Token
        AllowMethods:
          - GET
          - OPTIONS
        AllowOrigins:
          - !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Domain:
        BasePath:
          - /v1
        CertificateArn: !Sub
          - 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificate]
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
        EndpointConfiguration: REGIONAL
        Route53:
          DistributionDomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
          HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      FailOnWarnings: true
      StageName: v1
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment

  # Games

  GetGamesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-games.getGamesHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Retrieve available games
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref GamesTable
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /games
            Method: get
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-games.ts

  GetGamesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetGamesFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  GetGamesGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetGamesLogGroup

  GetGameByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-game-by-id.getGameByIdHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      MemorySize: 1024
      Description: Retrieve game by ID
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref GamesTable
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /games/{gameId}
            Method: get
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-game-by-id.ts

  GetGameByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetGameByIdFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  GetGameByIdGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetGameByIdLogGroup

  # Scheduled Game Creation

  CreateGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create-game.createGameHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Create new CYOA game
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBReadPolicy:
            TableName: !Ref PromptsTable
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'aws-marketplace:ViewSubscriptions'
                - 'aws-marketplace:Subscribe'
                - 'bedrock:InvokeModel*'
              Effect: Allow
              Resource: '*'
        - S3WritePolicy:
            BucketName: !Ref AssetsBucket
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !GetAtt CreateGameChoicesFunction.Arn
      Environment:
        Variables:
          CREATE_GAME_CHOICES_FUNCTION_NAME: !Ref CreateGameChoicesFunction
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          DYNAMODB_PROMPTS_TABLE_NAME: !Ref PromptsTable
          INSPIRATION_ADJECTIVES_COUNT: 15
          INSPIRATION_NOUNS_COUNT: 25
          INSPIRATION_VERBS_COUNT: 20
          PROMPT_ID_COVER_IMAGE: cover-image
          PROMPT_ID_CREATE_GAME: create-game
          PROMPT_ID_INVENTORY_IMAGE: inventory-image
          PROMPT_ID_RESOURCE_IMAGE: resource-image
          S3_ASSETS_BUCKET: !Ref AssetsBucket
          S3_ASSETS_DOMAIN: !FindInMap [EnvironmentMap, !Ref Environment, domainAssets]
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: 'cron(5 4 2/3 * ? *)'
            Description: Create game every three days at 4-5am UTC
            Enabled: !FindInMap [EnvironmentMap, !Ref Environment, scheduledGameCreationEnabled]
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment
      Timeout: 600
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/create-game.ts

  CreateGameLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CreateGameFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  CreateGameGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref CreateGameLogGroup

  # Game Choices Generation

  CreateGameChoicesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create-game-choices.createGameChoicesHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Generate choices for a CYOA game
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NarrativesTable
        - DynamoDBReadPolicy:
            TableName: !Ref PromptsTable
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'aws-marketplace:ViewSubscriptions'
                - 'aws-marketplace:Subscribe'
                - 'bedrock:InvokeModel*'
              Effect: Allow
              Resource: '*'
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !GetAtt CreateNarrativeFunction.Arn
      Environment:
        Variables:
          CREATE_NARRATIVE_FUNCTION_NAME: !Ref CreateNarrativeFunction
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          DYNAMODB_NARRATIVES_TABLE_NAME: !Ref NarrativesTable
          DYNAMODB_PROMPTS_TABLE_NAME: !Ref PromptsTable
          INSPIRATION_ADJECTIVES_COUNT: 15
          INSPIRATION_NOUNS_COUNT: 25
          INSPIRATION_VERBS_COUNT: 20
          PROMPT_ID_CREATE_CHOICES: create-choices
          RESOURCE_TO_ADD_PERCENT_MAX: 275
          RESOURCE_TO_ADD_PERCENT_MIN: 175
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment
      Timeout: 895
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/create-game-choices.ts

  CreateGameChoicesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CreateGameChoicesFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  CreateGameChoicesGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref CreateGameChoicesLogGroup

  # Choices

  GetChoiceByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-choice-by-id.getChoiceByIdHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      MemorySize: 1024
      Description: Retrieve choice by ID
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NarrativesTable
        - S3WritePolicy:
            BucketName: !Ref AssetsBucket
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !GetAtt CreateNarrativeFunction.Arn
      Environment:
        Variables:
          CREATE_NARRATIVE_FUNCTION_NAME: !Ref CreateNarrativeFunction
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          DYNAMODB_NARRATIVES_TABLE_NAME: !Ref NarrativesTable
          S3_ASSETS_BUCKET: !Ref AssetsBucket
          S3_ASSETS_DOMAIN: !FindInMap [EnvironmentMap, !Ref Environment, domainAssets]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /games/{gameId}/choices/{choiceId}
            Method: get
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-choice-by-id.ts

  GetChoiceByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetChoiceByIdFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  GetChoiceByIdGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetChoiceByIdLogGroup

  # Narratives

  CreateNarrativeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create-narrative.createNarrativeHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Create CYOA narrative
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NarrativesTable
        - DynamoDBReadPolicy:
            TableName: !Ref PromptsTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'aws-marketplace:ViewSubscriptions'
                - 'aws-marketplace:Subscribe'
                - 'bedrock:InvokeModel*'
              Effect: Allow
              Resource: '*'
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          DYNAMODB_NARRATIVES_TABLE_NAME: !Ref NarrativesTable
          DYNAMODB_PROMPTS_TABLE_NAME: !Ref PromptsTable
          INSPIRATION_ADJECTIVES_COUNT: 1
          INSPIRATION_NOUNS_COUNT: 3
          INSPIRATION_VERBS_COUNT: 2
          PROMPT_ID_COVER_IMAGE: cover-image
          PROMPT_ID_CREATE_ENDING_NARRATIVE: create-ending-narrative
          PROMPT_ID_CREATE_NARRATIVE: create-narrative
          PROMPT_ID_CREATE_OPTION_NARRATIVES: create-option-narratives
          PROMPT_ID_INVENTORY_IMAGE: inventory-image
          PROMPT_ID_NARRATIVE_IMAGE: narrative-image
          RESOURCE_TO_ADD_PERCENT_MAX: 275
          RESOURCE_TO_ADD_PERCENT_MIN: 175
          S3_ASSETS_BUCKET: !Ref AssetsBucket
          S3_ASSETS_DOMAIN: !FindInMap [EnvironmentMap, !Ref Environment, domainAssets]
      Tags:
        'created-by': 'cyoa-api'
        'created-for': 'cyoa'
        'environment': !Ref Environment
      Timeout: 295
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/create-narrative.ts

  CreateNarrativeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CreateNarrativeFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  CreateNarrativeGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref CreateNarrativeLogGroup

  # DynamoDB

  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: GameId
          AttributeType: S
        - AttributeName: CreatedAt
          AttributeType: N
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: GameId
          KeyType: HASH
        - AttributeName: CreatedAt
          KeyType: RANGE
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, gamesTable]
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  NarrativesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: GameId
          AttributeType: S
        - AttributeName: NarrativeId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: GameId
          KeyType: HASH
        - AttributeName: NarrativeId
          KeyType: RANGE
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, narrativesTable]
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  PromptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PromptId
          AttributeType: S
        - AttributeName: UpdatedAt
          AttributeType: N
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PromptId
          KeyType: HASH
        - AttributeName: UpdatedAt
          KeyType: RANGE
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, promptsTable]
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  # S3

  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      BucketName: !FindInMap [EnvironmentMap, !Ref Environment, bucketName]
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-api'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Statement:
          - Action: 's3:Get*'
            Effect: Allow
            Resource:
              - !Sub 'arn:aws:s3:::${AssetsBucket}/*'
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentity.S3CanonicalUserId

  # CDN

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub
          - 'Access identity for ${Domain}'
          - Domain: !FindInMap [EnvironmentMap, !Ref Environment, domainAssets]

  AssetsCloudfrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !FindInMap [EnvironmentMap, !Ref Environment, domainAssets]
        DefaultCacheBehavior:
          AllowedMethods:
            - 'GET'
            - 'HEAD'
            - 'OPTIONS'
          CachePolicyId: '658327ea-f89d-4fab-a63d-7e88639e58f6' # Managed-CachingOptimized
          Compress: true
          DefaultTTL: 0
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03 # Managed-SecurityHeadersPolicy
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: 'redirect-to-https'
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt AssetsBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub
                - 'origin-access-identity/cloudfront/${Identity}'
                - Identity: !Ref OriginAccessIdentity
        PriceClass: 'PriceClass_100'
        ViewerCertificate:
          AcmCertificateArn: !Sub
            - 'arn:aws:acm:us-east-1:${AWS::AccountId}:certificate/${Certificate}'
            - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificate]
          MinimumProtocolVersion: 'TLSv1.2_2018'
          SslSupportMethod: 'sni-only'
      Tags:
        - Key: 'created-by'
          Value: 'cyoa-ui'
        - Key: 'created-for'
          Value: 'cyoa'
        - Key: 'environment'
          Value: !Ref Environment

  # DNS

  DomainDns:
    Type: AWS::Route53::RecordSet
    Properties:
      AliasTarget:
        DNSName: !GetAtt AssetsCloudfrontDistribution.DomainName
        EvaluateTargetHealth: false
        HostedZoneId: Z2FDTNDATAQYW2 # CloudFront resources HostedZoneId
      HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      Name: !FindInMap [EnvironmentMap, !Ref Environment, domainAssets]
      Type: A
